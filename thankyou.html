<!DOCTYPE html>
<html lang="en" style="">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

  <!-- Exact same stylesheet as the original study-runner thank-you page -->
  <link rel="stylesheet" href="https://study-runner.vercel.app/_next/static/css/b8f00d98c96b8caa.css" data-precedence="next" />

  <!-- Exact same Fellix fonts -->
  <link rel="preload" href="https://study-runner.vercel.app/_next/static/media/75b6334742445b89-s.p.woff2" as="font" crossorigin="" type="font/woff2" />
  <link rel="preload" href="https://study-runner.vercel.app/_next/static/media/8a6b3d49ef575236-s.p.woff2" as="font" crossorigin="" type="font/woff2" />
  <link rel="preload" href="https://study-runner.vercel.app/_next/static/media/fe237bab4483b496-s.p.woff2" as="font" crossorigin="" type="font/woff2" />
  <link rel="shortcut icon" href="https://study-runner.vercel.app/favicon-hume.ico" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="next-size-adjust" content="" />
</head>
<body class="min-h-screen font-sans antialiased __variable_3c45cb">

  <main class="flex min-h-screen w-full flex-col items-center p-8">
    <!--$--><!--/$-->
    <div class="flex h-screen w-full max-w-[800px] flex-col items-start justify-start gap-4">

      <div class="text-2xl font-bold sm:text-3xl">Thank you for your participation!</div>

      <div class="break-all text-base sm:text-lg">
        Your submission has been recorded as "<span id="participant-id">…</span>". You can now close this window.
      </div>

      <!-- Download Screenshot Button -->
      <button
        id="download-btn"
        onclick="downloadScreenshot()"
        style="
          margin-top: 0.5rem;
          align-self: flex-start;
          background-color: hsl(var(--primary));
          color: hsl(var(--primary-foreground));
          border: none;
          border-radius: var(--radius);
          font-family: inherit;
          font-size: 0.875rem;
          font-weight: 500;
          padding: 0.5rem 1.25rem;
          cursor: pointer;
          transition: opacity 0.15s;
          display: inline-flex;
          align-items: center;
          gap: 0.4rem;
        "
        onmouseover="this.style.opacity='0.85'"
        onmouseout="this.style.opacity='1'"
      >
        ⬇ Download Screenshot
      </button>

    </div>
  </main>

  <!-- html2canvas for mobile-friendly page screenshot -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script>
    (function () {
      // Extract participantId from the current page's query string
      var params        = new URLSearchParams(window.location.search);
      var participantId = params.get('participantId') || '';

      // If no participantId found, redirect back to the input page
      if (!participantId) {
        window.location.replace('index.html');
        return;
      }

      document.getElementById('participant-id').textContent = participantId;
    })();

    function downloadScreenshot() {
      var btn = document.getElementById('download-btn');
      btn.textContent = 'Capturing…';
      btn.disabled = true;

      html2canvas(document.body, {
        scale: 2,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#ffffff'
      }).then(function (canvas) {
        var link = document.createElement('a');
        link.download = 'submission-confirmation.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        btn.innerHTML = '⬇ Download Screenshot';
        btn.disabled = false;
      }).catch(function () {
        btn.innerHTML = '⬇ Download Screenshot';
        btn.disabled = false;
        alert('Could not capture screenshot. Please try again.');
      });
    }
  </script>

</body>
</html>
