<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

  <!-- Exact same stylesheet as the original study-runner thank-you page -->
  <link rel="stylesheet" href="https://study-runner.vercel.app/_next/static/css/b8f00d98c96b8caa.css" data-precedence="next" />

  <!-- Exact same Fellix fonts -->
  <link rel="preload" href="https://study-runner.vercel.app/_next/static/media/75b6334742445b89-s.p.woff2" as="font" crossorigin="" type="font/woff2" />
  <link rel="preload" href="https://study-runner.vercel.app/_next/static/media/8a6b3d49ef575236-s.p.woff2" as="font" crossorigin="" type="font/woff2" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />

</head>
<body class="min-h-screen font-sans antialiased __variable_3c45cb">

  <main class="flex min-h-screen w-full flex-col items-center p-8">
    <!--$--><!--/$-->
    <div class="flex h-screen w-full max-w-[800px] flex-col items-start justify-start gap-4">

      <div class="text-2xl font-bold sm:text-3xl">Thank you for your participation!</div>

      <div class="break-all text-base sm:text-lg">
        Your submission has been recorded as "<span id="participant-id">…</span>". You can now close this window.
      </div>

    </div>
  </main>

  <script>
    (function () {
      // Extract participantId from the current page's query string
      var params        = new URLSearchParams(window.location.search);
      var participantId = params.get('participantId') || '';

      // If no participantId found, redirect back to the input page
      if (!participantId) {
        window.location.replace('index.html');
        return;
      }

      document.getElementById('participant-id').textContent = participantId;
    })();
  </script>

</body>
</html>
