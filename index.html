<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Runner – Sample Rating</title>
  <meta name="description" content="Study Runner Sample Rating portal. Paste your study URL to access your personalised thank-you page." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <main class="page-center">
    <div class="card" id="main-card">

      <!-- Logo / Icon -->
      <div class="logo-wrap">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <span class="logo-badge">Study Runner</span>
      </div>

      <h1 class="card-title">Sample Rating Portal</h1>
      <p class="card-subtitle">
        Paste your unique study URL below to access your personalised submission page.
      </p>

      <!-- URL Input -->
      <form id="url-form" novalidate>
        <div class="input-wrap" id="input-wrap">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
          </span>
          <input
            type="text"
            id="study-url"
            name="study-url"
            class="url-input"
            placeholder="https://study-runner.vercel.app/sample-rating?participantId=..."
            autocomplete="off"
            spellcheck="false"
          />
          <button type="submit" class="submit-btn" id="submit-btn">
            <span class="btn-text">Continue</span>
            <span class="btn-arrow">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </span>
          </button>
        </div>
        <div class="error-msg" id="error-msg" role="alert" aria-live="polite"></div>
      </form>

      <!-- Helper hint -->
      <div class="hint-box">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hint-icon">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p class="hint-text">
          Your URL contains a <code>participantId</code> parameter that uniquely identifies your submission.
          The system extracts it automatically.
        </p>
      </div>

    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
