<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Study Runner – Enter URL</title>
  <meta name="description" content="Paste your study URL to record your submission." />

  <!-- Exact same CSS as the original study-runner app -->
  <link rel="stylesheet" href="https://study-runner.vercel.app/_next/static/css/b8f00d98c96b8caa.css" data-precedence="next" />

  <!-- Preload the exact same Fellix fonts used by study-runner -->
  <link rel="preload" href="https://study-runner.vercel.app/_next/static/media/75b6334742445b89-s.p.woff2" as="font" crossorigin="" type="font/woff2" />
  <link rel="preload" href="https://study-runner.vercel.app/_next/static/media/8a6b3d49ef575236-s.p.woff2" as="font" crossorigin="" type="font/woff2" />
  <link rel="preload" href="https://study-runner.vercel.app/_next/static/media/fe237bab4483b496-s.p.woff2" as="font" crossorigin="" type="font/woff2" />
  <link rel="shortcut icon" href="https://study-runner.vercel.app/favicon-hume.ico" />
</head>
<body class="min-h-screen font-sans antialiased __variable_3c45cb">

  <main class="flex min-h-screen w-full flex-col items-center p-8">
    <div class="flex h-screen w-full max-w-[800px] flex-col items-start justify-start gap-4">

      <div class="text-2xl font-bold sm:text-3xl">Enter your study URL</div>

      <div class="break-all text-base sm:text-lg">
        Paste the full study URL you received and click <strong>Continue</strong> to record your submission.
      </div>

      <form id="url-form" style="width:100%;display:flex;flex-direction:column;gap:0.75rem;" novalidate>
        <input
          type="text"
          id="study-url"
          name="study-url"
          placeholder="https://study-runner.vercel.app/sample-rating?participantId=..."
          autocomplete="off"
          spellcheck="false"
          style="
            width: 100%;
            border: 1px solid hsl(var(--border));
            border-radius: var(--radius);
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.5rem;
            padding: 0.5rem 0.75rem;
            outline: none;
            box-sizing: border-box;
          "
        />
        <div id="error-msg" style="color:hsl(var(--destructive));font-size:0.875rem;min-height:1.25rem;"></div>
        <button
          type="submit"
          id="submit-btn"
          style="
            align-self: flex-start;
            background-color: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            border: none;
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.5rem 1.25rem;
            cursor: pointer;
            transition: opacity 0.15s;
          "
          onmouseover="this.style.opacity='0.85'"
          onmouseout="this.style.opacity='1'"
        >
          Continue
        </button>
      </form>

    </div>
  </main>

  <script>
    (function () {
      var form  = document.getElementById('url-form');
      var input = document.getElementById('study-url');
      var errEl = document.getElementById('error-msg');

      function extractParams(raw) {
        raw = (raw || '').trim();
        if (!raw) return null;
        var search = '';
        try { search = new URL(raw).search; }
        catch (_) { search = raw.indexOf('?') === -1 ? '?' + raw : raw; }
        var p = new URLSearchParams(search);
        return {
          participantId : p.get('participantId')  || '',
          studyId       : p.get('studyId')        || '',
          submissionId  : p.get('submissionId')   || '',
          TASK_TYPE     : p.get('TASK_TYPE')      || '',
          PAGE          : p.get('PAGE')           || '',
          PAGE_SIZE     : p.get('PAGE_SIZE')      || '',
          step          : p.get('step')           || '',
          MANUAL        : p.get('MANUAL')         || '',
          PREASSIGNED   : p.get('PREASSIGNED')    || '',
        };
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        errEl.textContent = '';
        var raw    = input.value.trim();
        if (!raw)  { errEl.textContent = 'Please paste your study URL.'; return; }
        var params = extractParams(raw);
        if (!params || !params.participantId) {
          errEl.textContent = 'Could not find a participantId in the URL. Please check and try again.';
          return;
        }
        var dest = new URL('thankyou.html', window.location.href);
        Object.keys(params).forEach(function (k) { if (params[k]) dest.searchParams.set(k, params[k]); });
        window.location.href = dest.toString();
      });
    })();
  </script>

</body>
</html>
